<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>NEXOURA Logo Lockup — Size Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="components.css">
  <style>
    body { padding: 48px; }
    .row { display: flex; align-items: center; gap: 32px; padding: 32px 0; border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row .label { font-family: 'Sora', sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-secondary); min-width: 96px; }
  </style>
</head>
<body>
  <h1>NEXOURA Logo Lockup</h1>
  <p>O-ring is rendered as a CSS gradient ring (mask-cut, not flat disc). 4 size variants.</p>

  <div class="row">
    <div class="label">XL · 80px</div>
    <span class="nx-logo nx-logo--xl">
      <span class="nx-wordmark-pre">NEX</span>
      <span class="nx-oring" aria-label="O"></span>
      <span class="nx-wordmark-post">URA</span>
    </span>
  </div>

  <div class="row">
    <div class="label">LG · 48px</div>
    <span class="nx-logo nx-logo--lg">
      <span class="nx-wordmark-pre">NEX</span>
      <span class="nx-oring" aria-label="O"></span>
      <span class="nx-wordmark-post">URA</span>
    </span>
  </div>

  <div class="row">
    <div class="label">MD · 32px</div>
    <span class="nx-logo nx-logo--md">
      <span class="nx-wordmark-pre">NEX</span>
      <span class="nx-oring" aria-label="O"></span>
      <span class="nx-wordmark-post">URA</span>
    </span>
  </div>

  <div class="row">
    <div class="label">SM · 20px</div>
    <span class="nx-logo nx-logo--sm">
      <span class="nx-wordmark-pre">NEX</span>
      <span class="nx-oring" aria-label="O"></span>
      <span class="nx-wordmark-post">URA</span>
    </span>
  </div>

  <h2 style="margin-top:48px">O-ring mark alone</h2>
  <div class="row">
    <span class="nx-mark nx-mark--16"></span>
    <span class="nx-mark nx-mark--24"></span>
    <span class="nx-mark nx-mark--32"></span>
    <span class="nx-mark nx-mark--48"></span>
    <span class="nx-mark nx-mark--64"></span>
  </div>

  <h2 style="margin-top:48px">SVG O-ring (favicon-ready)</h2>
  <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="NEXOURA mark">
    <defs>
      <linearGradient id="nxg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"  stop-color="#7861FF"/>
        <stop offset="28%" stop-color="#5B30FF"/>
        <stop offset="68%" stop-color="#2563FF"/>
        <stop offset="100%" stop-color="#00E0FF"/>
      </linearGradient>
    </defs>
    <circle cx="32" cy="32" r="26" fill="none" stroke="url(#nxg)" stroke-width="5"/>
  </svg>
</body>
</html>
