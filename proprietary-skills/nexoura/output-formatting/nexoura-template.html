<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — NEXOURA · STUDIO</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Offline fallback: Sora woff in ./assets/ (or sibling fonts/). Google Fonts above is preferred. */
  @font-face {
    font-family: 'Sora';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: local('Sora'),
         url('./assets/sora-regular.woff') format('woff'),
         url('../assets/sora-regular.woff') format('woff'),
         url('fonts/Sora-Regular.woff2') format('woff2');
  }
</style>
<style>
  :root {
    --nx-purple: #7861FF;
    --nx-violet: #5B30FF;
    --nx-blue:   #2563FF;
    --nx-cyan:   #00E0FF;
    --nx-navy:   #0A0F16;
    --nx-white:  #F5F7FA;
    --nx-slate-900: #101826;
    --nx-slate-700: #475569;
    --nx-slate-300: #cbd5e1;
    --nx-slate-400: #94a3b8;
    --nx-grad: linear-gradient(135deg, #7861FF 0%, #5B30FF 28%, #2563FF 68%, #00E0FF 100%);
    --nx-border: rgba(120,97,255,0.20);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--nx-navy);
    color: var(--nx-white);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Geist, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .nx-wrap { max-width: 960px; margin: 0 auto; padding: 56px 40px 80px; }

  /* Header */
  .nx-header { position: relative; display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; padding-bottom: 28px; margin-bottom: 40px; border-bottom: 1px solid var(--nx-border); }
  .nx-kicker { display: inline-block; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px; background: rgba(120,97,255,0.12); color: var(--nx-purple); border: 1px solid var(--nx-border); }
  .nx-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 2.5rem; line-height: 1.15; margin: 18px 0 8px; color: #ffffff; letter-spacing: -0.01em; }
  .nx-subtitle { font-family: 'Inter', sans-serif; font-weight: 400; color: var(--nx-slate-300); font-size: 1.05rem; margin: 0; max-width: 64ch; }
  .nx-date { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: var(--nx-slate-400); text-align: right; white-space: nowrap; }
  .nx-author { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--nx-slate-400); margin-top: 6px; text-align: right; }

  /* O-ring logo mark (CSS only) */
  .nx-oring { position: relative; width: 48px; height: 48px; border-radius: 50%; background: var(--nx-grad); padding: 2px; margin-bottom: 12px; margin-left: auto; }
  .nx-oring::before { content: ""; position: absolute; inset: 2px; background: var(--nx-navy); border-radius: 50%; }
  .nx-oring::after { content: ""; position: absolute; inset: 11px; border-radius: 50%; background: var(--nx-grad); opacity: 0.95; }

  /* Metric grid */
  .nx-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin: 8px 0 40px; }
  .nx-metric { padding: 20px 22px; border: 1px solid var(--nx-border); border-radius: 14px; background: rgba(120,97,255,0.04); }
  .nx-metric .label { font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--nx-slate-400); margin-bottom: 8px; }
  .nx-metric .value { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 2rem; line-height: 1.1; color: var(--nx-purple); }
  .nx-metric:nth-child(3n+2) .value { color: var(--nx-blue); }
  .nx-metric:nth-child(3n+3) .value { color: var(--nx-cyan); }
  .nx-metric .delta { font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--nx-slate-300); margin-top: 6px; }

  /* Body */
  .nx-body { font-family: 'Inter', sans-serif; color: var(--nx-white); }
  .nx-body h2 { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 1.5rem; color: #ffffff; padding-left: 14px; margin-top: 44px; margin-bottom: 14px; border-left: 3px solid; border-image: var(--nx-grad) 1; }
  .nx-body h3 { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 1.15rem; color: var(--nx-white); margin-top: 28px; margin-bottom: 10px; }
  .nx-body p, .nx-body li { color: var(--nx-slate-300); }
  .nx-body strong { color: var(--nx-white); font-weight: 600; }
  .nx-body code { background: rgba(120,97,255,0.10); padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace; font-size: 0.92em; color: var(--nx-cyan); }
  .nx-body pre { background: var(--nx-slate-900); padding: 16px 18px; border-radius: 10px; border: 1px solid var(--nx-border); overflow-x: auto; font-size: 0.9rem; }
  .nx-body pre code { background: transparent; color: var(--nx-white); padding: 0; }
  .nx-body a { color: var(--nx-cyan); text-decoration: none; border-bottom: 1px solid rgba(0,224,255,0.35); }
  .nx-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.95rem; }
  .nx-body th, .nx-body td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--nx-border); }
  .nx-body th { font-family: 'Sora', sans-serif; font-weight: 600; color: var(--nx-white); }

  /* Status pills */
  .pill { display: inline-block; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.72rem; letter-spacing: 0.10em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; border: 1px solid; vertical-align: middle; }
  .pill-verified { color: #34d399; background: rgba(52,211,153,0.10); border-color: rgba(52,211,153,0.35); }
  .pill-resolved { color: var(--nx-cyan); background: rgba(0,224,255,0.10); border-color: rgba(0,224,255,0.35); }
  .pill-pending  { color: #fbbf24; background: rgba(251,191,36,0.10); border-color: rgba(251,191,36,0.35); }
  .pill-blocked  { color: #f87171; background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.40); }
  .pill-p0 { color: #ffffff; background: #DC2626; border-color: #DC2626; }
  .pill-p1 { color: #ffffff; background: #2563FF; border-color: #2563FF; }
  .pill-p2 { color: #0A0F16; background: #F59E0B; border-color: #F59E0B; }
  .pill-p3 { color: #ffffff; background: #6B7280; border-color: #6B7280; }
  .pill-p4 { color: #ffffff; background: #6B7280; border-color: #6B7280; }

  /* Footer */
  .nx-footer { margin-top: 72px; padding-top: 24px; border-top: 1px solid var(--nx-border); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--nx-slate-400); }
  .nx-wordmark { font-family: 'Sora', sans-serif; font-weight: 700; letter-spacing: 0.16em; color: var(--nx-white); }
  .nx-tagline-wrap { text-align: center; }
  .nx-tagline-img { display: inline-block; max-width: 100%; height: auto; border-radius: 4px; opacity: 0.95; }
  .nx-ts { text-align: right; }

  @media (max-width: 640px) {
    .nx-wrap { padding: 32px 20px 56px; }
    .nx-title { font-size: 1.9rem; }
    .nx-header { grid-template-columns: 1fr; }
    .nx-date, .nx-author, .nx-oring { text-align: left; margin-left: 0; }
    .nx-footer { grid-template-columns: 1fr; text-align: center; }
    .nx-ts { text-align: center; }
  }
</style>
</head>
<body>
<div class="nx-wrap">

  <header class="nx-header">
    <div>
      <span class="nx-kicker">{{KICKER}}</span>
      <h1 class="nx-title">{{TITLE}}</h1>
      <p class="nx-subtitle">{{SUBTITLE}}</p>
    </div>
    <div>
      <div class="nx-oring" aria-label="NEXOURA O-ring mark"></div>
      <div class="nx-date">{{DATE}}</div>
      <div class="nx-author">{{AUTHOR_PROFILE}}</div>
    </div>
  </header>

  <section class="nx-metrics">
    {{METRICS_HTML}}
  </section>

  <main class="nx-body">
    {{BODY_HTML}}
  </main>

  <footer class="nx-footer">
    <div class="nx-wordmark">NEXOURA</div>
    <div class="nx-tagline-wrap">
      <img class="nx-tagline-img" src="{{FOOTER_TAGLINE_PNG}}" alt="WHERE AI BUILDS" width="300" height="30">
    </div>
    <div class="nx-ts">Generated {{TIMESTAMP}}</div>
  </footer>

</div>
</body>
</html>
