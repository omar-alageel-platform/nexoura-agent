<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your NEXOURA Forge account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --nx-purple: #7861FF; --nx-violet: #5B30FF; --nx-blue: #2563FF; --nx-cyan: #00E0FF;
    --nx-navy: #0A0F16; --nx-white: #F5F7FA;
    --slate-900: #101826; --slate-700: #475569; --slate-500: #94A3B8;
    --bg: #F8F9FC; --ink: #0A0F16; --ink-soft: #475569;
    --nx-gradient: linear-gradient(135deg, #7861FF 0%, #5B30FF 28%, #2563FF 68%, #00E0FF 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Sora', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.5; color: var(--ink); background: var(--bg); min-height: 100vh; }
  body { position: relative; overflow-x: hidden; }
  body::before { content: ""; position: fixed; top: -300px; left: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(120,97,255,0.12) 0%, transparent 60%); pointer-events: none; }
  body::after { content: ""; position: fixed; bottom: -300px; right: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0,224,255,0.1) 0%, transparent 60%); pointer-events: none; }
  a { color: var(--nx-violet); text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }

  .wrap { min-height: 100vh; display: grid; place-items: center; padding: 2rem 1.25rem; position: relative; z-index: 1; }

  .card { background: #FFFFFF; border: 1px solid rgba(15,23,42,0.08); border-radius: 1.25rem; padding: 3rem 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 24px 48px -16px rgba(15,23,42,0.12); }

  .brand { text-align: center; margin-bottom: 2rem; }
  .nx-logo { display: inline-flex; align-items: center; font-weight: 700; letter-spacing: 0.12em; font-size: 1.15rem; color: var(--ink); }
  .nx-oring { width: 1em; height: 1em; vertical-align: -0.15em; }
  .tagline { display: block; font-size: 0.7rem; letter-spacing: 0.28em; color: var(--slate-500); font-weight: 600; margin-top: 0.6rem; }

  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 0.4rem; text-align: center; }
  .lede { color: var(--ink-soft); font-size: 0.92rem; text-align: center; margin-bottom: 2rem; }

  form { display: flex; flex-direction: column; gap: 1.1rem; }
  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field label { font-size: 0.82rem; font-weight: 600; color: var(--ink); }
  .field .hint { font-size: 0.78rem; color: var(--slate-500); font-weight: 400; }
  .field input[type="email"], .field input[type="password"], .field input[type="text"] {
    height: 44px; padding: 0 0.95rem; border: 1px solid rgba(15,23,42,0.14); border-radius: 0.6rem; font-family: inherit; font-size: 0.95rem; color: var(--ink); background: #FFFFFF; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input::placeholder { color: var(--slate-500); }
  .field input:focus { outline: none; border-color: var(--nx-purple); box-shadow: 0 0 0 3px rgba(120,97,255,0.18); }

  .checkbox { display: flex; align-items: flex-start; gap: 0.65rem; font-size: 0.85rem; color: var(--ink-soft); line-height: 1.5; cursor: pointer; }
  .checkbox input { width: 18px; height: 18px; accent-color: var(--nx-violet); margin-top: 0.1rem; flex-shrink: 0; }

  button.submit {
    background: var(--nx-gradient); color: #fff; border: none; border-radius: 0.6rem; padding: 0.85rem 1rem; font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.15s; box-shadow: 0 6px 16px -6px rgba(91,48,255,0.4);
  }
  button.submit:hover { transform: translateY(-1px); box-shadow: 0 10px 22px -6px rgba(91,48,255,0.5); }
  button.submit:active { transform: translateY(0); }

  .divider { display: flex; align-items: center; gap: 0.75rem; margin: 0.25rem 0; color: var(--slate-500); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: rgba(15,23,42,0.08); }

  .sso { display: flex; flex-direction: column; gap: 0.6rem; }
  .sso button { display: flex; align-items: center; justify-content: center; gap: 0.6rem; height: 44px; background: #FFFFFF; border: 1px solid rgba(15,23,42,0.14); border-radius: 0.6rem; color: var(--ink); font-family: inherit; font-size: 0.92rem; font-weight: 500; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .sso button:hover { border-color: var(--nx-purple); background: rgba(120,97,255,0.03); }

  .footer-link { text-align: center; font-size: 0.9rem; color: var(--ink-soft); margin-top: 1.5rem; }

  .legal { text-align: center; font-size: 0.75rem; color: var(--slate-500); margin-top: 2rem; }

  @media (max-width: 768px) {
    .wrap { padding: 1.25rem 1rem; }
    .card { padding: 2.25rem 1.5rem; border-radius: 1rem; }
    h1 { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <div class="brand">
      <a href="/" class="nx-logo" aria-label="NEXOURA home">
        NEX<svg class="nx-oring" viewBox="0 0 32 32" aria-hidden="true">
          <defs><linearGradient id="og3" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7861FF"/><stop offset="28%" stop-color="#5B30FF"/>
            <stop offset="68%" stop-color="#2563FF"/><stop offset="100%" stop-color="#00E0FF"/>
          </linearGradient></defs>
          <circle cx="16" cy="16" r="12" fill="none" stroke="url(#og3)" stroke-width="4"/>
        </svg>URA
      </a>
      <span class="tagline">WHERE AI BUILDS</span>
    </div>

    <h1>Create your Forge account</h1>
    <p class="lede">Start a 14-day trial. No credit card. Cancel anytime.</p>

    <form onsubmit="event.preventDefault();">
      <div class="field">
        <label for="email">Work email</label>
        <input id="email" name="email" type="email" placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Password <span class="hint">(min. 12 characters)</span></label>
        <input id="password" name="password" type="password" placeholder="At least 12 characters" autocomplete="new-password" minlength="12" required>
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input id="company" name="company" type="text" placeholder="Meridian Logistics" autocomplete="organization" required>
      </div>

      <label class="checkbox">
        <input type="checkbox" required>
        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>, and to receive product updates from NEXOURA.</span>
      </label>

      <button type="submit" class="submit">Create account</button>

      <div class="divider">or continue with</div>

      <div class="sso">
        <button type="button">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
        <button type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23 12c0-6.07-4.93-11-11-11S1 5.93 1 12c0 5.49 4.04 10.04 9.31 10.86V15.2H7.5v-3.2h2.81V9.55c0-2.78 1.66-4.32 4.19-4.32 1.21 0 2.48.22 2.48.22v2.73h-1.4c-1.38 0-1.81.86-1.81 1.74V12h3.08l-.49 3.2h-2.59v7.66C18.96 22.04 23 17.49 23 12z"/></svg>
          Continue with Microsoft
        </button>
      </div>
    </form>

    <p class="footer-link">Already have an account? <a href="#">Sign in</a></p>
  </div>
</div>

<p class="legal">© 2026 NEXOURA Studio · <a href="#" style="color: var(--slate-500);">Privacy</a> · <a href="#" style="color: var(--slate-500);">Terms</a> · <a href="#" style="color: var(--slate-500);">SOC 2</a></p>

</body>
</html>
