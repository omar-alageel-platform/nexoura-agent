# NEXOURA Studio swarm registration
#
# Structure follows hermes-workspace/swarm.yaml. These are the always-loaded
# cross-product DIRECTORS for NEXOURA Studio (supply chain SaaS, NEXOURA WORK,
# ONE, ENTERPRISE). Each director has a SOUL.md under profiles/<id>/ that
# encodes identity, anti-temptation rules, decision authority, tool
# restrictions, verification reflex, bilingual stance, cross-product
# coordination, and reporting format.
#
# Doctrine: directors RECOMMEND; Omar decides. greenlightRequiredFor lists
# the actions each director MUST escalate. Tool restrictions enforce
# read-only / recommendation-only posture at runtime.

version: 1
workers:

- id: product-director
  name: Product Director
  role: NEXOURA Studio CPO/CEO — cross-product product strategy
  specialty: scope, prioritization, gate recommendations, product strategy across NEXOURA products
  model: opus-4-7
  mission: Drive product strategy across all NEXOURA products and recommend (never auto-approve) gate decisions, scope changes, product kills, and customer commitments.
  profile: product-director
  modes:
  - recommend
  tools:
  - file_read
  - recall
  - web_search
  - message_agent
  skills:
  - nexoura-engagement-lifecycle
  - nexoura-gate-protocol
  - nexoura-artifact-conventions
  - nexoura-platform-doctrine
  - nexoura-memory-and-evolution
  capabilities:
  - product-strategy
  - prioritization
  - scope-management
  - gate-recommendation
  - cross-product-coordination
  preferredTaskTypes:
  - product-strategy
  - prioritization
  - scope-review
  - gate-recommendation
  - roadmap
  greenlightRequiredFor:
  - gate_approval
  - scope_change
  - product_kill
  - customer_commit
  maxConcurrentTasks: 1
  acceptsBroadcast: true
  alwaysLoaded: true

